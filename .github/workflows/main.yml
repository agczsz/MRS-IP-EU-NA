name: Generate Mihomo Rulesets

on:
  schedule:
    - cron: '0 2 * * *' # 每天凌晨 2 点执行
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests pandas

      - name: Download Mihomo
        run: |
          # 获取最新 Tag
          TAG=$(curl -s https://api.github.com/repos/MetaCubeX/mihomo/releases/latest | jq -r .tag_name)
          # 构造下载链接
          URL="https://github.com/MetaCubeX/mihomo/releases/download/${TAG}/mihomo-linux-amd64-${TAG}.gz"
          
          echo "Downloading Mihomo $TAG..."
          curl -L -o mihomo.gz "$URL"
          
          # 解压并重命名
          gunzip -f mihomo.gz
          chmod +x mihomo
          ./mihomo -v

      - name: Run Converter
        env:
          IPINFO_TOKEN: ${{ secrets.IPINFO_TOKEN }}
        run: |
          mkdir -p Continents
          python convert.py

      - name: Commit and Push
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Auto-update MRS: $(date +'%Y-%m-%d %H:%M')"
          file_pattern: "Continents/**"
